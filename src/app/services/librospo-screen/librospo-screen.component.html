<div class="wrapper">
  <div class="header-home-admin">
    <app-navbar></app-navbar>
  </div>
  <div class="body-alumnos">
    <div class="row mt-5 mb-5">
      <div class="col-12">
        <span class="title-perfil">Bienvenido {{name_user}}</span>
        <br><br>
        <span class="title-perfil">{{rol}}</span>
      </div>
    </div>
    <div class="container">
      <div class="row mt-3 mb-5" style="text-align: center;">
        <div class="col-12">
          <div class="alert alert-primary" role="alert">
            <span class="title-table">Lista de Libros más populares</span>
          </div>
        </div>
      </div>
      <!-- Tabla de angular material -->
      <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource">
            <!-- 1era fila -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef> ID Libro </th>
                <td mat-cell *matCellDef="let element"> {{element.id_libro}} </td>
            </ng-container>

            <!-- 2da fila -->
            <ng-container matColumnDef="titulo">
                <th mat-header-cell *matHeaderCellDef> Título </th>
                <td mat-cell *matCellDef="let element"> {{element.titulo}} </td>
            </ng-container>

            <ng-container matColumnDef="id_autor">
              <th mat-header-cell *matHeaderCellDef> ID Autor </th>
              <td mat-cell *matCellDef="let element"> {{element.id_autor}} </td>
            </ng-container>

            <ng-container matColumnDef="id_genero">
              <th mat-header-cell *matHeaderCellDef> ID Género </th>
              <td mat-cell *matCellDef="let element"> {{element.id_genero}} </td>
            </ng-container>

            <ng-container matColumnDef="veces_prestado">
              <th mat-header-cell *matHeaderCellDef> Veces Prestado </th>
              <td mat-cell *matCellDef="let element"> {{element.veces_prestado}} </td>
            </ng-container>


            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                       showFirstLastButtons
                       aria-label="Select page of periodic elements">
        </mat-paginator>
      </div>
    </div>
  </div>
</div>
